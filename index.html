<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>What's New At LU - Login</title>

    <link rel="stylesheet" href="login.css">

</head>

<body>

    <div class="login-container">

        <h1>What's New At LU</h1>
        <h2>Campus Events Portal</h2>

        <form onsubmit="logIn(event)">

            <label for="username">
                Username
            </label>

            <input
                type="text"
                id="username"
                required>

            <label for="password">
                Password
            </label>

            <input
                type="password"
                id="password"
                required>

            <p id="error-message"></p>

            <input
                type="submit"
                value="Log In">

        </form>

    </div>

    <script src="login.js"></script>

</body>

</html>
